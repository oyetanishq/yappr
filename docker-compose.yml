name: yappr

services:
  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: yappr_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data/redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yappr_net

  # ── Redis Insight ──────────────────────────────────────────────────────────
  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data/redis
    depends_on:
      - redis
    networks:
      - yappr_net

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: yappr_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand(\"ping\").ok'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yappr_net

  # ── API (Go) ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .                     # repo root — needed for go.work + shared module
      dockerfile: apps/api/Dockerfile
    container_name: yappr_api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - yappr_net

  # ── Agent (Go) ─────────────────────────────────────────────────────────────
  agent:
    build:
      context: .                     # repo root — needed for go.work + shared module
      dockerfile: apps/agent/Dockerfile
    container_name: yappr_agent
    restart: unless-stopped
    env_file:
      - ./apps/agent/.env
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - yappr_net

  # ── Frontend (Vite) ────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: yappr_web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - yappr_net

volumes:
  redis_data:
  mongo_data:
  redisinsight_data:

networks:
  yappr_net:
    driver: bridge