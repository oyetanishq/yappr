name: yappr

services:
  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: yappr_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yappr_net

  # ── Redis Insight ──────────────────────────────────────────────────────────
  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    depends_on:
      - redis
    networks:
      - yappr_net

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: yappr_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand(\"ping\").ok'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yappr_net

  # ── API (Go) ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .                     # repo root — needed for go.work + shared module
      dockerfile: apps/api/Dockerfile
    container_name: yappr_api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=mongodb://mongo:27017
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - yappr_net

  # ── Agent (Go) ─────────────────────────────────────────────────────────────
  agent:
    build:
      context: .                     # repo root — needed for go.work + shared module
      dockerfile: apps/agent/Dockerfile
    container_name: yappr_agent
    restart: unless-stopped
    env_file:
      - ./apps/agent/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=mongodb://mongo:27017
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - yappr_net

  # ── Frontend (Vite) ────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: yappr_web
    restart: unless-stopped
    env_file:
      - ./apps/agent/.env
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - yappr_net

  # ── Seed Scripts ───────────────────────────────────────────────────────────
  seed:
    build:
      context: .                     # repo root — needed for go.work + shared module
      dockerfile: apps/scripts/Dockerfile
    container_name: yappr_seed
    profiles:
      - seed
    env_file:
      - ./apps/api/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=mongodb://mongo:27017
    # Write the users.json into the mapped volume for k6
    command: ["-env", "", "-out", "/workspace/apps/k6/users.json"]
    volumes:
      - ./apps/k6:/workspace/apps/k6
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - yappr_net

  # ── k6 Stress Testing ──────────────────────────────────────────────────────
  k6:
    build:
      context: ./apps/k6
      dockerfile: Dockerfile
    container_name: yappr_k6
    profiles:
      - test
    depends_on:
      api:
        condition: service_healthy
    networks:
      - yappr_net

networks:
  yappr_net:
    driver: bridge