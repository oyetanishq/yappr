name: Stress Testing (k6)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  stress-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Start Core Services
        run: |
          docker compose up -d --build
          echo "Waiting for database and API services to be healthy..."
          
          # Wait up to 60 seconds for API to be healthy
          for i in {1..20}; do
            if [ "$(docker inspect --format='{{json .State.Health.Status}}' yappr_api)" = "\"healthy\"" ]; then
              echo "API is healthy!"
              break
            fi
            echo "Waiting..."
            sleep 3
          done

      - name: Build and Run k6 Stress Tests
        run: |
          docker compose --profile test build k6
          # Run without TTY (-T) and output to a file
          docker compose --profile test run -T --rm k6 > k6_report.txt
          cat k6_report.txt

      - name: Generate GitHub Step Summary
        if: always()
        run: |
          if [ -f k6_report.txt ]; then
            # Extract key metrics using grep/awk for a clean summary table
            HTTP_REQS=$(grep -E 'http_reqs\.' k6_report.txt | awk '{print $2 " " $3}')
            HTTP_DURATION=$(grep -E 'http_req_duration\.' k6_report.txt | awk '{print $2}')
            P95_DURATION=$(grep -E 'http_req_duration\.' k6_report.txt | awk -F'p\(95\)=' '{print $2}')
            SUCCESS_RATE=$(grep -E 'http_req_failed\.' k6_report.txt | awk '{print $2}')
            TOTAL_ITERATIONS=$(grep -E 'iterations\.' k6_report.txt | awk '{print $2}')

            echo "### ⚡ k6 Stress Test Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total Requests** | $HTTP_REQS |" >> $GITHUB_STEP_SUMMARY
            echo "| **Avg Request Duration** | $HTTP_DURATION |" >> $GITHUB_STEP_SUMMARY
            echo "| **p(95) Request Duration** | $P95_DURATION |" >> $GITHUB_STEP_SUMMARY
            echo "| **Success Rate (Failed Reqs)** | $SUCCESS_RATE (failed) |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total Iterations** | $TOTAL_ITERATIONS |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>🔍 View Full Raw k6 Output</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
            cat k6_report.txt >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ k6 test report was not found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload k6 Report Artifact
        if: always()
        uses: actions/artifacts@v4
        with:
          name: k6-stress-test-report
          path: k6_report.txt

      - name: Stop Containers
        if: always()
        run: |
          docker compose down -v
