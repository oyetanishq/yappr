name: Stress Testing (k6)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  stress-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment Variables
        run: |
          cp apps/api/.env.example apps/api/.env
          cp apps/agent/.env.example apps/agent/.env

      - name: Start Services
        run: docker compose up --build -d --wait redis mongo api agent

      - name: Generate Seed Data
        run: docker compose --profile seed run --build --rm seed

      - name: Run k6 Tests
        id: k6
        run: docker compose --profile test run -T --build --rm k6 --quiet | tee k6-output.txt

      - name: Add k6 report to Job Summary
        if: always()
        run: |
          echo "## k6 Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat k6-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Stop Services
        if: always()
        run: docker compose down -v
